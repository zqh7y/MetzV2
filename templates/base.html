<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Meetup App{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    {% block extra_head %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}

    <script>
        function toggleJoin(btn, meetingId) {
            fetch('/join/' + meetingId, { method: 'POST' })
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    if (data.error) return;
                    btn.classList.toggle('joined', data.joined);
                    var textEl = btn.querySelector('.join-btn-text');
                    if (textEl) textEl.textContent = data.joined ? 'Joined' : 'Join';
                    updateJoinedAvatars(btn, data);
                    if (typeof MEETINGS_DATA !== 'undefined') {
                        var meeting = MEETINGS_DATA.find(function (m) { return m.id === meetingId; });
                        if (meeting) {
                            meeting.joined_count = data.count;
                            meeting.joined_preview = data.joined_preview;
                            if (data.joined && meeting.joined_uids.indexOf(CURRENT_UID) === -1) {
                                meeting.joined_uids.push(CURRENT_UID);
                            } else if (!data.joined) {
                                var idx = meeting.joined_uids.indexOf(CURRENT_UID);
                                if (idx !== -1) meeting.joined_uids.splice(idx, 1);
                            }
                        }
                    }
                });
        }

        function updateJoinedAvatars(btn, data) {
            var container = btn.parentElement;
            if (!container) return;
            var avatarsEl = container.querySelector('.joined-avatars');
            var html = '';
            if (data.count > 0 && typeof buildJoinedAvatarsHtml === 'function') {
                html = buildJoinedAvatarsHtml({ joined_count: data.count, joined_preview: data.joined_preview });
            }
            if (avatarsEl) {
                if (html) avatarsEl.outerHTML = html;
                else avatarsEl.remove();
            } else if (html) {
                btn.insertAdjacentHTML('beforebegin', html);
            }
        }

        function deleteMeeting(meetingId, cardEl) {
            if (!confirm('Delete this meeting?')) return;
            fetch('/delete/' + meetingId, { method: 'POST' })
                .then(function (r) { return r.json(); })
                .then(function (data) {
                    if (data.error) { alert('You are not allowed to delete this meeting.'); return; }
                    if (cardEl) {
                        cardEl.style.transition = 'opacity 0.3s, transform 0.3s';
                        cardEl.style.opacity = '0';
                        cardEl.style.transform = 'translateX(60px)';
                        setTimeout(function () { cardEl.remove(); }, 300);
                    } else {
                        window.location.reload();
                    }
                });
        }
    </script>
</body>
</html>
